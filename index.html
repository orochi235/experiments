<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Experiments</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e; color: #e0e0e0;
    padding: 48px 32px; min-height: 100vh;
  }
  h1 { font-size: 1.6rem; color: #fff; margin-bottom: 6px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 32px; }
  .experiments {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px; max-width: 960px;
  }
  .card {
    background: #16213e; border: 1px solid #2a3a5a; border-radius: 10px;
    padding: 20px 24px; text-decoration: none; color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .card:hover { background: #1a2a4a; border-color: #7ec8e3; }
  .card h2 { font-size: 1.1rem; color: #7ec8e3; margin-bottom: 6px; font-weight: 600; }
  .card p { font-size: 0.82rem; color: #999; line-height: 1.5; }
</style>
</head>
<body>
<h1>Experiments</h1>
<p class="subtitle">Standalone micro-projects and interactive demos</p>
<div class="experiments">
  <a class="card" href="sky-color/sky-models.html">
    <h2>Sky Color Models</h2>
    <p>Interactive comparison of atmospheric scattering models (Preetham, Nishita, Hosek-Wilkie, CIE) with planetary presets, stellar physics, and style controls.</p>
  </a>
</div>
</body>
</html>
